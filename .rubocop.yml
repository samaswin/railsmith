# Merge with default AllCops excludes (node_modules, tmp, vendor, .git) so a
# custom Exclude does not drop them — without vendor/***, CI scans vendor/bundle
# and can load nested gem configs that require optional cops (e.g. rubocop-rake).
inherit_mode:
  merge:
    - Exclude

AllCops:
  TargetRubyVersion: 3.1
  NewCops: enable
  Exclude:
    - "railsmith_sample/**/*"

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

Metrics/MethodLength:
  Exclude:
    - "spec/**/*"

# Keyword arguments do not add meaningful complexity; exclude them from the count.
Metrics/ParameterLists:
  CountKeywordArgs: false

# Orchestrator classes and implementation modules legitimately exceed the default.
Metrics/ClassLength:
  Max: 160

Metrics/ModuleLength:
  Max: 220

# has_many / has_one are intentional Rails-style DSL names, not predicate queries.
Naming/PredicatePrefix:
  AllowedMethods:
    - has_many
    - has_one
