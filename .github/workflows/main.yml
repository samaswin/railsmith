name: CI

on:
  push:
    branches:
      - main

  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Run RuboCop
        run: bundle exec rubocop

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { ruby: "3.1", gemfile: "gemfiles/rails_7_0.gemfile", rails: "7.0" }
          - { ruby: "3.1", gemfile: "gemfiles/rails_7_1.gemfile", rails: "7.1" }
          - { ruby: "3.2", gemfile: "gemfiles/rails_7_0.gemfile", rails: "7.0" }
          - { ruby: "3.2", gemfile: "gemfiles/rails_7_1.gemfile", rails: "7.1" }
          - { ruby: "3.2", gemfile: "gemfiles/rails_8_0.gemfile", rails: "8.0" }
          - { ruby: "3.3", gemfile: "gemfiles/rails_7_1.gemfile", rails: "7.1" }
          - { ruby: "3.3", gemfile: "gemfiles/rails_8_0.gemfile", rails: "8.0" }
    name: Ruby ${{ matrix.ruby }} / Rails ${{ matrix.rails }}
    env:
      BUNDLE_GEMFILE: ${{ github.workspace }}/${{ matrix.gemfile }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run test suite
        run: bundle exec rspec
      - name: Railsmith arch check (fixture smoke)
        run: RAILSMITH_PATHS=spec/fixtures/controllers RAILSMITH_FORMAT=json bundle exec rake railsmith:arch_check
